# Example triggers driven by the git plugin.
#
# The git plugin's actions all auto-publish completion events
# via the Phase 14.1 `ActionRegistry::with_completion_bus`
# fan-out. Every successful `git.*` dispatch surfaces as
# `<name>.completed` on the bus with the action's return payload;
# every failure surfaces as `<name>.failed` with `{code, message}`.
# So the chained trigger below lights up automatically — no plugin-
# side bookkeeping required.
#
# Filesystem-driven events (`git.worktree_created`,
# `git.branch_created`, `git.checkout`, ...) are slice 2 of Phase 17
# and are NOT yet published — uncomment after that lands.

# ---------------------------------------------------------------------
# 1. Vision Flow 3 (the killer demo): when `git.worktree_add`
#    succeeds, drop a Claude session in the new worktree.
#    Auto-emitted by the Phase 14.1 fan-out — no plugin-side
#    code needed. Combine with `todo.start_requested →
#    git.worktree_add` upstream to get the full chain
#    `Todo start → worktree → claude tab`.
#
#    Note: `prompt` field is rejected by claude.start in slice 1
#    (Phase 18.1) — it lands in 18.2 once tmux send-keys timing
#    is designed. The user pastes the prompt into claude after
#    the tab opens.
# ---------------------------------------------------------------------
[[triggers]]
name = "worktree-then-claude"
action = "claude.start"
params = { workspace_path = "{event.path}" }

[triggers.when]
event_kind = "git.worktree_add.completed"

# ---------------------------------------------------------------------
# 2. KB log of every worktree creation, for end-of-day review.
# ---------------------------------------------------------------------
[[triggers]]
name = "log-new-worktrees-to-kb"
action = "kb.append"
params = { id = "logs/worktrees.md", content = "- {event.workspace}/{event.branch} → {event.path}\n", ensure = true }

[triggers.when]
event_kind = "git.worktree_add.completed"
