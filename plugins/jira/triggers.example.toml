# ---------------------------------------------------------------------
# Trigger language quick reference (Phase 10.2 / Phase 14)
# ---------------------------------------------------------------------
# `[triggers.when]`     — required positive match: `event_kind` glob
#                          plus key=value payload equality.
# `condition = "..."`   — optional boolean expression evaluated AFTER
#                          `when` matches.
#                          Operators: == != < <= > >= && || !
#                          References: event.X.Y / context.X
#                          Literals: "string", numbers, true/false/null
# `[triggers.await]`    — optional Phase 14.2 correlation primitive
#                          (event_kind + payload_match + timeout) for
#                          chained ask-and-wait flows. Not used in the
#                          examples above; see vision-flow-3.toml for
#                          a worked example with discord.get_message.
