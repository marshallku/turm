<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Todos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { padding: 12px 16px; font-size: 0.92rem; }
  h1 { font-size: 1.05rem; margin: 0 0 12px; color: var(--turm-subtext1);
       font-weight: 500; letter-spacing: 0.02em; }

  /* Toolbar — every control is exactly 30px tall via box-sizing +
     explicit height so input/select/button/label-toggle align. */
  .toolbar {
    display: flex; gap: 8px; align-items: center; margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .toolbar > input,
  .toolbar > select,
  .toolbar > button,
  .toolbar > label.toggle {
    height: 30px;
    border-radius: 4px;
    font: inherit;
    line-height: 1;
  }
  .toolbar > input.new-input { flex: 1 1 240px; min-width: 180px; }
  .toolbar > input,
  .toolbar > select {
    background: var(--turm-surface0); color: var(--turm-text);
    border: 1px solid var(--turm-surface2);
    padding: 0 10px;
  }
  .toolbar > input::placeholder { color: var(--turm-subtext0); }
  .toolbar > input:disabled { opacity: 0.6; }
  .toolbar > button {
    background: var(--turm-accent); color: var(--turm-bg);
    border: 0; padding: 0 12px; cursor: pointer;
  }
  .toolbar > button.ghost {
    background: transparent; color: var(--turm-subtext1);
    border: 1px solid var(--turm-surface2);
  }
  .toolbar > button:hover { filter: brightness(1.1); }
  .toolbar > label.toggle {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 0 10px;
    border: 1px solid var(--turm-surface2);
    color: var(--turm-subtext1);
    cursor: pointer; user-select: none;
  }
  .toolbar > label.toggle input[type="checkbox"] {
    /* Native checkbox: don't inherit the toolbar input sizing. */
    height: auto; width: auto; margin: 0;
    accent-color: var(--turm-accent);
  }

  /* Board: 3 columns, collapses to 2 when Done is hidden. */
  .board {
    display: grid; gap: 10px;
    grid-template-columns: repeat(var(--cols, 3), minmax(0, 1fr));
  }
  .board.hide-done { --cols: 2; }
  .board.hide-done .col[data-status="done"] { display: none; }

  .col {
    display: flex; flex-direction: column; min-height: 140px; min-width: 0;
    background: var(--turm-surface0);
    border: 1px solid var(--turm-surface1);
    border-radius: 6px;
  }
  .col-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px;
    color: var(--turm-subtext1);
    font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em;
    border-bottom: 1px solid var(--turm-surface1);
  }
  .col-head .count {
    background: var(--turm-surface2); color: var(--turm-subtext1);
    font-size: 0.7rem; padding: 1px 7px; border-radius: 999px;
    text-transform: none; letter-spacing: 0; min-width: 22px; text-align: center;
  }
  .col-body {
    padding: 8px; flex: 1;
    display: flex; flex-direction: column; gap: 6px;
    transition: background-color 80ms ease-out, box-shadow 80ms ease-out;
  }
  .col-body.drag-over {
    background: var(--turm-surface1);
    box-shadow: inset 0 0 0 1px var(--turm-accent);
  }
  .col-empty {
    color: var(--turm-subtext0); font-size: 0.8rem;
    text-align: center; padding: 14px 6px;
    font-style: italic;
    border: 1px dashed var(--turm-surface2);
    border-radius: 4px;
    pointer-events: none;
  }

  /* Card */
  .card {
    background: var(--turm-surface1);
    border: 1px solid var(--turm-surface2);
    border-radius: 4px;
    padding: 8px 10px;
    cursor: grab; user-select: none;
    display: flex; flex-direction: column; gap: 6px;
    position: relative;
    /* Block WebKit's native HTML5 drag entirely — we use Pointer Events. */
    -webkit-user-drag: none;
    touch-action: none;
  }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: 0.25; }
  .card.drag-ghost {
    box-shadow: 0 8px 22px rgba(0,0,0,0.55);
    transform: rotate(-2deg) scale(1.02);
    opacity: 0.7;
    border: 1px solid var(--turm-accent);
    background: var(--turm-surface2);
  }
  /* While a drag is in flight, kill text selection across the whole
     panel — without this, the pointer-event sweep would also
     start a native text-selection drag on column headers / titles
     and the visual ghost ends up competing with a marquee. */
  body.is-dragging,
  body.is-dragging * {
    user-select: none !important;
    -webkit-user-select: none !important;
    cursor: grabbing !important;
  }
  .card.drag-ghost .actions { display: none !important; }
  .card .title { line-height: 1.3; word-break: break-word; padding-right: 70px; }
  .card.done .title { color: var(--turm-subtext0); text-decoration: line-through; }
  .card .meta { display: flex; flex-wrap: wrap; gap: 4px; font-size: 0.75em; }
  /* Actions are always visible (not hover-revealed) — Start is the
     primary workflow trigger; hiding it behind hover wrecked
     discoverability. The padding-right on .title above keeps long
     titles from running under the button. */
  .card .actions {
    display: flex; position: absolute; top: 6px; right: 6px; gap: 4px;
  }
  .card.drag-ghost .actions { display: none !important; }
  .card .actions button {
    background: var(--turm-accent); color: var(--turm-bg);
    border: 0;
    border-radius: 3px;
    padding: 3px 10px; font-size: 0.75em;
    line-height: 1; cursor: pointer;
    font-weight: 500;
  }
  .card .actions button:hover { filter: brightness(1.1); }

  .badge {
    font-size: 0.72em; padding: 1px 6px; border-radius: 4px;
    background: var(--turm-surface2); color: var(--turm-subtext1);
    line-height: 1.4;
  }
  .badge.high { background: var(--turm-red); color: var(--turm-bg); }
  .badge.blocked { background: var(--turm-red); color: var(--turm-bg); }

  .err { color: var(--turm-red); padding: 12px; }
  .loading { color: var(--turm-subtext0); padding: 12px; font-style: italic; }
</style>
</head>
<body>
<h1>Todos</h1>
<div class="toolbar">
  <input class="new-input" id="new-title" placeholder="New todo title (Enter to create)" />
  <button id="refresh" class="ghost" title="Reload">refresh</button>
  <label class="toggle" title="Hide Done column">
    <input id="hide-done" type="checkbox" />
    <span>hide done</span>
  </label>
</div>
<div id="status" class="loading">loading…</div>
<div id="board" class="board" hidden>
  <div class="col" data-status="open">
    <div class="col-head"><span>Todo</span><span class="count" data-count>0</span></div>
    <div class="col-body" data-status="open"></div>
  </div>
  <div class="col" data-status="in_progress">
    <div class="col-head"><span>Doing</span><span class="count" data-count>0</span></div>
    <div class="col-body" data-status="in_progress"></div>
  </div>
  <div class="col" data-status="done">
    <div class="col-head"><span>Done</span><span class="count" data-count>0</span></div>
    <div class="col-body" data-status="done"></div>
  </div>
</div>

<script>
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

const HIDE_KEY = "turm-todo-hide-done";
const COLUMNS = ["open", "in_progress", "done"];
// Items with status "blocked" don't have their own column. They live
// in the Todo column with a red badge. Set blocked via vim-only
// frontmatter edit; dragging out of Todo loses the blocked state by
// design (target column dictates the new status).
const COLUMN_OF = (status) => status === "blocked" ? "open" : status;

const board = $("#board");
const statusEl = $("#status");
const newInput = $("#new-title");
const hideDone = $("#hide-done");

hideDone.checked = (() => {
  try { return localStorage.getItem(HIDE_KEY) === "1"; } catch { return false; }
})();
applyHideDone();
hideDone.addEventListener("change", applyHideDone);

function applyHideDone() {
  const hidden = hideDone.checked;
  board.classList.toggle("hide-done", hidden);
  try { localStorage.setItem(HIDE_KEY, hidden ? "1" : "0"); } catch {}
}

// Retry budget for the FIRST load only — covers a startup race where
// the panel opens before the supervisor's dispatch wiring is fully
// up. Subsequent loads (drag/drop, Start, watcher events) skip the
// retry so a real plugin error surfaces immediately.
const INITIAL_LOAD_BACKOFF_MS = [200, 800, 3000];

// Generation counter so a slow retry doesn't clobber the UI after a
// newer load() (manual refresh, watcher event) already finished. Each
// load() bumps the counter and bails on render/error if a newer call
// has started in the meantime.
let loadGen = 0;

async function load({ retry = false } = {}) {
  const myGen = ++loadGen;
  const attempts = retry ? [0, ...INITIAL_LOAD_BACKOFF_MS] : [0];
  let lastErr;
  for (let i = 0; i < attempts.length; i++) {
    if (attempts[i]) await new Promise(r => setTimeout(r, attempts[i]));
    if (myGen !== loadGen) return;
    try {
      const { todos } = await turm.call("todo.list", {});
      if (myGen !== loadGen) return;
      render(todos);
      return;
    } catch (e) {
      if (myGen !== loadGen) return;
      lastErr = e;
      if (i < attempts.length - 1) {
        statusEl.className = "loading";
        statusEl.textContent = `load failed (${e.message}) — retrying…`;
        statusEl.hidden = false;
        board.hidden = true;
      }
    }
  }
  if (myGen !== loadGen) return;
  statusEl.className = "err";
  statusEl.textContent = `load failed: ${lastErr?.message || "unknown"} (click refresh to retry)`;
  statusEl.hidden = false;
  board.hidden = true;
}

function render(todos) {
  const byCol = { open: [], in_progress: [], done: [] };
  for (const t of todos) byCol[COLUMN_OF(t.status)].push(t);
  for (const status of COLUMNS) {
    const body = $(`.col-body[data-status="${status}"]`);
    body.innerHTML = "";
    const items = byCol[status];
    if (!items.length) {
      const empty = document.createElement("div");
      empty.className = "col-empty";
      empty.textContent = status === "done" ? "—" : "drop here";
      body.appendChild(empty);
    } else {
      for (const t of items) body.appendChild(buildCard(t));
    }
    $(`.col[data-status="${status}"] [data-count]`).textContent = items.length;
  }
  statusEl.hidden = true;
  board.hidden = false;
}

function buildCard(t) {
  const card = document.createElement("div");
  card.className = `card ${t.status}`;
  card.dataset.id = t.id;
  card.dataset.workspace = t.workspace;
  card.dataset.status = t.status;

  const title = document.createElement("div");
  title.className = "title";
  title.textContent = t.title;
  card.appendChild(title);

  const badges = [];
  if (t.priority && t.priority !== "normal") badges.push(badge(t.priority, t.priority));
  if (t.status === "blocked") badges.push(badge("blocked", "blocked"));
  if (t.due) badges.push(badge("", `due ${t.due}`));
  if (t.linked_jira) badges.push(badge("", t.linked_jira));
  if (badges.length) {
    const meta = document.createElement("div");
    meta.className = "meta";
    badges.forEach(b => meta.appendChild(b));
    card.appendChild(meta);
  }

  const actions = document.createElement("div");
  actions.className = "actions";
  if (t.status === "open" || t.status === "blocked") {
    const start = document.createElement("button");
    start.textContent = "▶ start";
    start.title = "Move to Doing and fire the todo.start_requested workflow trigger (vision-flow-3)";
    start.addEventListener("click", (e) => { e.stopPropagation(); onStart(t); });
    actions.appendChild(start);
  }
  card.appendChild(actions);

  // Pointer Events instead of HTML5 native drag-and-drop. WebKitGTK6
  // hands the native HTML5 `dragstart` off to the GTK drag controller,
  // which initiates a system-level drag operation that can stall the
  // GTK main loop and produce an "application not responding" hang
  // before any `drop` handler runs. Pointer Events stay inside the
  // WebView's renderer and let us paint the drag ghost ourselves.
  card.addEventListener("pointerdown", onCardPointerDown);

  return card;
}

function badge(cls, text) {
  const span = document.createElement("span");
  span.className = `badge ${cls}`.trim();
  span.textContent = text;
  return span;
}

// --- Pointer-event-based drag-and-drop ---
const DRAG_THRESHOLD_PX = 5;
let dragState = null; // { card, pointerId, startX, startY, ghost?, dragging }

function onCardPointerDown(e) {
  // Don't start a drag from action buttons (Start). They have their own click handler.
  if (e.target.closest(".actions")) return;
  if (e.button !== 0 && e.pointerType === "mouse") return;
  // Suppress the browser's default text-selection behavior — without
  // this, pointermove past the threshold would also start a marquee
  // selection across the column body / titles.
  e.preventDefault();
  const card = e.currentTarget;
  dragState = {
    card,
    pointerId: e.pointerId,
    startX: e.clientX, startY: e.clientY,
    ghost: null,
    dragging: false,
  };
  // Capture so we keep getting moves even if the cursor leaves the card.
  card.setPointerCapture(e.pointerId);
  card.addEventListener("pointermove", onCardPointerMove);
  card.addEventListener("pointerup", onCardPointerUp);
  card.addEventListener("pointercancel", onCardPointerCancel);
}

function onCardPointerMove(e) {
  if (!dragState || e.pointerId !== dragState.pointerId) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  if (!dragState.dragging) {
    if (Math.hypot(dx, dy) < DRAG_THRESHOLD_PX) return;
    // Promote to active drag — build a floating ghost.
    dragState.dragging = true;
    const rect = dragState.card.getBoundingClientRect();
    const ghost = dragState.card.cloneNode(true);
    ghost.classList.add("drag-ghost");
    ghost.style.position = "fixed";
    ghost.style.left = rect.left + "px";
    ghost.style.top = rect.top + "px";
    ghost.style.width = rect.width + "px";
    ghost.style.pointerEvents = "none";
    ghost.style.zIndex = "9999";
    document.body.appendChild(ghost);
    dragState.ghost = ghost;
    dragState.offsetX = e.clientX - rect.left;
    dragState.offsetY = e.clientY - rect.top;
    dragState.card.classList.add("dragging");
    document.body.classList.add("is-dragging");
    // Clear any selection that may have started before the threshold trip.
    if (window.getSelection) window.getSelection().removeAllRanges();
  }
  dragState.ghost.style.left = (e.clientX - dragState.offsetX) + "px";
  dragState.ghost.style.top = (e.clientY - dragState.offsetY) + "px";
  // Highlight the column body under the cursor.
  const targetBody = columnBodyAt(e.clientX, e.clientY);
  $$(".col-body").forEach(b => b.classList.toggle("drag-over", b === targetBody));
}

function onCardPointerUp(e) {
  if (!dragState || e.pointerId !== dragState.pointerId) return;
  const { card, ghost, dragging } = dragState;
  cleanupDrag();
  if (!dragging) return;
  const targetBody = columnBodyAt(e.clientX, e.clientY);
  if (!targetBody) return;
  const targetStatus = targetBody.dataset.status;
  const prevStatus = card.dataset.status;
  if (COLUMN_OF(prevStatus) === targetStatus) return;
  performDrop(card, targetStatus);
}

function onCardPointerCancel(e) {
  if (!dragState || e.pointerId !== dragState.pointerId) return;
  cleanupDrag();
}

function cleanupDrag() {
  if (!dragState) return;
  const { card, ghost, pointerId } = dragState;
  if (ghost && ghost.parentNode) ghost.parentNode.removeChild(ghost);
  card.classList.remove("dragging");
  try { card.releasePointerCapture(pointerId); } catch {}
  card.removeEventListener("pointermove", onCardPointerMove);
  card.removeEventListener("pointerup", onCardPointerUp);
  card.removeEventListener("pointercancel", onCardPointerCancel);
  $$(".col-body").forEach(b => b.classList.remove("drag-over"));
  document.body.classList.remove("is-dragging");
  dragState = null;
}

function columnBodyAt(x, y) {
  // Use elementFromPoint and walk up to find the col-body; fall back to
  // bounding-rect hit-test in case the cursor is over a child.
  let el = document.elementFromPoint(x, y);
  while (el && el !== document.body) {
    if (el.classList && el.classList.contains("col-body")) return el;
    el = el.parentElement;
  }
  return null;
}

async function performDrop(card, targetStatus) {
  const id = card.dataset.id;
  const workspace = card.dataset.workspace;
  moveCardOptimistic(card, targetStatus);
  try {
    await turm.call("todo.set_status", { id, workspace, status: targetStatus });
    // load() reconciles action-button visibility (Start only on Todo
    // column) without waiting for the watcher's 2s poll cycle.
    load();
  } catch (err) {
    alert(`set_status failed: ${err.message}`);
    load();
  }
}

// Move a card DOM node into the target column body and refresh counts +
// empty-state placeholders. Used by both drag-drop and the Start button so
// the panel feels instant — the file-watcher round-trip can take up to 2s.
function moveCardOptimistic(card, targetStatus) {
  const sourceBody = card.parentElement;
  const targetBody = $(`.col-body[data-status="${targetStatus}"]`);
  card.dataset.status = targetStatus;
  card.classList.remove("open", "in_progress", "blocked", "done");
  card.classList.add(targetStatus);
  const targetEmpty = targetBody.querySelector(".col-empty");
  if (targetEmpty) targetEmpty.remove();
  targetBody.appendChild(card);
  if (sourceBody && !sourceBody.querySelector(".card")) {
    const sourceStatus = sourceBody.dataset.status;
    const empty = document.createElement("div");
    empty.className = "col-empty";
    empty.textContent = sourceStatus === "done" ? "—" : "drop here";
    sourceBody.appendChild(empty);
  }
  refreshCounts();
}

function refreshCounts() {
  for (const status of COLUMNS) {
    const n = $(`.col-body[data-status="${status}"]`).querySelectorAll(".card").length;
    $(`.col[data-status="${status}"] [data-count]`).textContent = n;
  }
}

async function onStart(t) {
  // Bump to in_progress visually + fire todo.start (publishes
  // todo.start_requested for the trigger chain in vision-flow-3.toml).
  // If set_status fails, don't fire start — the chain depending on a
  // doing-state mismatch is worse than nothing.
  const card = $(`.card[data-id="${CSS.escape(t.id)}"][data-workspace="${CSS.escape(t.workspace)}"]`);
  const wasNotInProgress = t.status !== "in_progress";
  try {
    if (wasNotInProgress) {
      if (card) moveCardOptimistic(card, "in_progress");
      await turm.call("todo.set_status", {
        id: t.id, workspace: t.workspace, status: "in_progress",
      });
    }
    await turm.call("todo.start", { id: t.id, workspace: t.workspace });
    if (wasNotInProgress) load();
  } catch (err) {
    alert(`start failed: ${err.message}`);
    if (wasNotInProgress) load();
  }
}

newInput.addEventListener("keydown", async (e) => {
  if (e.key !== "Enter") return;
  const title = newInput.value.trim();
  if (!title) return;
  newInput.disabled = true;
  try {
    await turm.call("todo.create", { title });
    newInput.value = "";
    // Same reason as drop/start: don't wait up to 2s for the watcher
    // poll. Reload immediately so the new card is visible before the
    // user might press Enter again.
    load();
  } catch (err) {
    alert(`create failed: ${err.message}`);
  } finally {
    newInput.disabled = false;
    newInput.focus();
  }
});

// Manual refresh + watcher-driven reloads use the no-retry path: an
// error here means a real failure (plugin crashed mid-session, file
// permissions changed) that the user should see immediately.
$("#refresh").addEventListener("click", () => load());
turm.on("todo.created", () => load());
turm.on("todo.changed", () => load());
turm.on("todo.completed", () => load());
turm.on("todo.deleted", () => load());

// Initial load DOES retry — covers the startup-race where the panel
// opens before the dispatch wiring / plugin handshake is ready.
load({ retry: true });
</script>
</body>
</html>
