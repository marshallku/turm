[plugin]
name = "slack"
title = "Slack"
version = "0.1.0"
description = "Slack Socket Mode plugin: emits slack.mention / slack.dm / slack.raw and provides slack.post_message for replies."

[[services]]
name = "main"
exec = "turm-plugin-slack"
# onStartup: Socket Mode requires a long-lived WebSocket connection
# that needs to be alive whenever turm is, so events flow inbound at
# arrival time. Lazy (onAction) activation works for slack.post_message
# alone but would lose mention/DM events between turm starts and the
# first action call — which defeats the point.
activation = "onStartup"
restart = "on-crash"
provides = ["slack.auth_status", "slack.post_message"]
subscribes = []
# Required env: TURM_SLACK_BOT_TOKEN (xoxb-...), TURM_SLACK_APP_TOKEN (xapp-...)
# Optional env: TURM_SLACK_WORKSPACE (default "default" — keyring entry namespace),
#               TURM_SLACK_REQUIRE_SECURE_STORE (default false — refuse plaintext fallback)
#
# One-time setup:
#   1. Create a Slack App at https://api.slack.com/apps
#   2. Enable Socket Mode (Settings → Socket Mode); generate an
#      App-Level Token with `connections:write` scope (xapp-...)
#   3. Subscribe to bot events (Event Subscriptions): app_mention, message.im
#   4. Add OAuth scopes (OAuth & Permissions, Bot Token Scopes):
#      app_mentions:read, im:history, users:read,
#      chat:write    ← REQUIRED for slack.post_message (Phase 11.2)
#   5. Install to your workspace; copy the Bot User OAuth Token (xoxb-...)
#   6. Run `TURM_SLACK_BOT_TOKEN=xoxb-... TURM_SLACK_APP_TOKEN=xapp-... turm-plugin-slack auth`
