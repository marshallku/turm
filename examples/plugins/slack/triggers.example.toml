#    Slack's deep-link format: https://<workspace>.slack.com/archives/<channel>/p<ts-without-dot>
#    Note: that URL transform isn't expressible in the current
#    interpolation DSL (no string ops); user would need a small wrapper
#    action (Phase 11.3 candidate). Kept here as a "future composable"
#    sketch.
# ---------------------------------------------------------------------
