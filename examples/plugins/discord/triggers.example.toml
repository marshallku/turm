# Example triggers driven by the Discord plugin (slice 2 + 2.5).
#
# The plugin emits FIVE event kinds:
#   - `discord.mention`  — MESSAGE_CREATE @-mentioning the bot or
#                          @everyone. Wins priority over .message and
#                          .dm — a single MESSAGE_CREATE produces ONE
#                          filtered event.
#   - `discord.dm`       — DM-channel MESSAGE_CREATE (no guild_id)
#                          that does NOT mention the bot.
#   - `discord.message`  — guild-channel MESSAGE_CREATE (has guild_id)
#                          that does NOT mention the bot.
#   - `discord.reaction` — MESSAGE_REACTION_ADD. Doesn't carry the
#                          original message body; chain
#                          `discord.get_message` to fetch it.
#   - `discord.raw`      — every MESSAGE_CREATE (unfiltered firehose,
#                          intended for the archive trigger below).
#
# Filtered payload shape (mention / dm / message):
#   { message_id, channel_id, guild_id, message_url, author_id,
#     author_username, content, mention_everyone, mentions_bot }
# Reaction payload shape:
#   { message_id, channel_id, guild_id, message_url, user_id,
#     message_author_id, emoji_name, emoji_id, emoji_animated }
# `message_url` is `https://discord.com/channels/{guild_id|@me}/{channel_id}/{message_id}`
# pre-built so triggers can embed the link in a captured Todo body
# (the interpolation DSL has no string-concat). Designed for the
# claude-fetches-from-link workflow: nestty captures the link, claude
# in a downstream session resolves the body.
#
# Raw payload shape:
#   { event_type, channel_id, guild_id, message_id, event_json }
#   where `event_json` is the verbatim Discord MESSAGE_CREATE `d`
#   object (embeds, attachments, components, mentions array, all of it).
#
# discord.send_message action:
#   nestctl call discord.send_message --params \
#     '{"channel_id":"123456789","content":"hello"}'
#   Returns {message_id, channel_id} on success. Failure codes
#   (top-level error.code, structurally matchable by trigger
#   payload_match against the discord.send_message.failed event):
#     - "rate_limited"      — HTTP 429 (Retry-After in the message)
#     - "discord_<numeric>" — Discord API error, e.g. "discord_50001"
#                             (Missing Access), "discord_50013"
#                             (Missing Permissions). Numeric codes
#                             from Discord's JSON error code table.
#     - "io_error"          — transport-level failure with no Discord
#                             error body (DNS, TLS, connection reset).

# ---------------------------------------------------------------------
# 1. Raw archive — capture EVERY MESSAGE_CREATE to a per-guild folder.
#    Keyed by message_id (Discord snowflake), so RESUME-driven re-delivery
#    of the same message naturally dedupes via kb.ensure.
#
#    For DMs, guild_id is null — the path interpolates as `.raw/discord/null/...`
#    which collapses all DMs into one folder. If you want DMs separated,
#    branch into two triggers (one with `event.guild_id != null`, one
#    with `== null`) and use `dm` instead of the null literal.
# ---------------------------------------------------------------------
[[triggers]]
name = "discord-archive-raw"
action = "kb.ensure"
params = { id = ".raw/discord/{event.guild_id}/{event.message_id}.json", default_template = "{event.event_json}\n" }

[triggers.when]
event_kind = "discord.raw"

# ---------------------------------------------------------------------
# 2. Mention → personal-tasks file
#    Every @-mention of the bot appends to a single rolling notes file.
#    Skip @everyone broadcasts (often noisy announcements) by gating
#    the trigger to direct mentions only via condition.
# ---------------------------------------------------------------------
[[triggers]]
name = "discord-mention-to-personal-tasks"
action = "kb.append"
params = { id = "threads/discord-mentions.md", content = """

## {event.message_id} in {event.channel_id} — from {event.author_username}

{event.content}

""", ensure = true }
condition = "!event.mention_everyone"

[triggers.when]
event_kind = "discord.mention"

# ---------------------------------------------------------------------
# 3. DM auto-reply (write action; Phase 14.2 await pattern)
#    On every DM, send an LLM-generated reply. Uses the Phase 14.2
#    `await` clause to chain: kick off llm.complete with the DM content,
#    wait for `llm.complete.completed`, then post the reply back.
#    Mirrors the Slack ask-and-wait sketch in slack/triggers.example.toml.
# ---------------------------------------------------------------------
# [[triggers]]
# name = "discord-dm-llm-reply"
# action = "llm.complete"
# params = { prompt = "{event.content}\n\nRespond briefly." }
# [triggers.when]
# event_kind = "discord.dm"
# [triggers.await]
# event_kind = "llm.complete.completed"
# timeout_seconds = 60
# on_timeout = "abort"
#
# [[triggers]]
# name = "discord-dm-llm-reply-post"
# action = "discord.send_message"
# params = { channel_id = "{event.channel_id}", content = "{event.await.completion}" }
# [triggers.when]
# event_kind = "llm.complete.completed"
# # Note: this second trigger is required because nestty's trigger model
# # is action-then-await-then-end. The await result lives on the
# # follow-up `llm.complete.completed` event which the second trigger
# # consumes via payload_match (channel_id forwarded as a correlation
# # token through llm.complete params).

# ---------------------------------------------------------------------
# 4. Channel-scoped subscription
#    The plugin emits messages from ALL channels the bot can see.
#    Use `payload_match` to subscribe to a single channel:
# ---------------------------------------------------------------------
# [[triggers]]
# name = "discord-engineering-only"
# action = "kb.append"
# params = { id = "threads/eng-channel.md", content = "{event.author_username}: {event.content}\n", ensure = true }
# [triggers.when]
# event_kind = "discord.message"
# payload_match = { channel_id = "1234567890" }

# ---------------------------------------------------------------------
# 5. Mention-as-command — "@bot kb search foo" → kb.search trigger
#    Parsing the mention text into a structured command isn't
#    expressible in the current interpolation DSL (no string ops),
#    so use a passthrough action that re-dispatches with parsed
#    params. Sketch only — needs a small command-router action.
# ---------------------------------------------------------------------

# ====================================================================
# 6. Emoji-react → Todo capture  ★ ACTIVE BY DEFAULT ★
# ====================================================================
# React with 📝 on a Discord message → nestty fetches the body and
# creates a Todo with the message URL + content. Uses Phase 14.2
# `await` so the get_message reply is correlated to THIS specific
# reaction (without correlation, every successful get_message
# anywhere would fire a Todo).
#
# ┌────────────────────────────────────────────────────────────┐
# │ 🔧 EMOJI CONFIG — change ONE LINE to use a different emoji │
# │                                                            │
# │ Discord uses raw unicode emoji in `emoji_name`. To switch  │
# │ to ⭐ for example, change `"📝"` on the `condition` line   │
# │ below to `"⭐"`. The Slack equivalent is in                │
# │ `examples/plugins/slack/triggers.example.toml` — change    │
# │ those separately because Slack uses NAMES (e.g. "memo")    │
# │ instead of unicode literals.                               │
# │                                                            │
# │ Want multiple emojis to fire the same chain? Use `||` in   │
# │ the condition: `event.emoji_name == "📝" ||                │
# │ event.emoji_name == "⭐"`. Want different actions per      │
# │ emoji? Duplicate the trigger pair with a unique `name`.    │
# └────────────────────────────────────────────────────────────┘
#
# `event.await.content` reads the fetched Discord message body.
# `event.await` carries the verbatim Discord message JSON so
# object-key accesses like `event.await.author.id` work via the
# dot-path interpolator. (Array fields like `attachments[0].url`
# don't index in the current resolver — surface what you need as
# a scalar in the body and parse it downstream if needed.)
# ====================================================================
[[triggers]]
name = "discord-memo-capture-fetch"
action = "discord.get_message"
params = { channel_id = "{event.channel_id}", message_id = "{event.message_id}" }
condition = """event.emoji_name == "📝" """          # ◀ EMOJI HERE
[triggers.when]
event_kind = "discord.reaction"
[triggers.await]
event_kind = "discord.get_message.completed"
timeout_seconds = 10
on_timeout = "abort"

[[triggers]]
name = "discord-memo-capture-create"
action = "todo.create"
# Title kept short and stable (always populated, never gets cut off
# in the kanban). Body has the full content + the URL so a future
# claude session with a Discord-link MCP tool can re-resolve
# context. The interpolation DSL has no truncate/fallback, so
# deriving the title from content directly would break on
# empty-content reactions (image-only) and explode on 2000-char
# messages.
params = { title = "Discord capture {event.message_id}", body = """
{event.await.content}

Source: {event.message_url}
""", workspace = "default" }
[triggers.when]
event_kind = "discord-memo-capture-fetch.awaited"

