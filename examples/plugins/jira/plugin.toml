[plugin]
name = "jira"
title = "Jira (Atlassian Cloud)"
version = "0.1.0"
description = "Atlassian Cloud Jira plugin (slice 16.1: auth subcommand + jira.auth_status only). Slice 16.2 will add a polling loop emitting jira.ticket_assigned/status_changed/comment_added/mention plus 5 read/write actions."

[[services]]
name = "main"
exec = "nestty-plugin-jira"
# onStartup: the polling daemon (slice 16.2) must be alive whenever
# nestty is running so it can publish ticket-assigned and
# status-change events on schedule. Lazy activation
# (onAction:jira.*) would only spawn on the first explicit query —
# too late for "ticket got assigned to me, create a Todo for it".
# Slice 16.1 only ships auth_status, but onStartup keeps the
# manifest stable across slices.
activation = "onStartup"
restart = "on-crash"
provides = [
    "jira.auth_status",
]
subscribes = []
# Setup (one-time):
#   1. Generate an API token at https://id.atlassian.com/manage-profile/security/api-tokens
#   2. Set env vars in your shell rc:
#        export NESTTY_JIRA_BASE_URL=https://yourcompany.atlassian.net
#        export NESTTY_JIRA_EMAIL=you@example.com
#        export NESTTY_JIRA_API_TOKEN=<token-from-step-1>
#   3. Run `nestty-plugin-jira auth` once to validate + persist to keyring
#   4. Restart nestty (the supervisor only loads service handles at startup)
#
# Required env (for `auth`; optional for RPC mode if creds in store):
#   NESTTY_JIRA_BASE_URL    — https://<workspace>.atlassian.net (no trailing slash)
#   NESTTY_JIRA_EMAIL       — your Atlassian account email
#   NESTTY_JIRA_API_TOKEN   — generated at id.atlassian.com
#
# Optional env:
#   NESTTY_JIRA_WORKSPACE              (default "default")  — keyring/plaintext namespace label
#   NESTTY_JIRA_REQUIRE_SECURE_STORE   (default false)      — refuse plaintext fallback
#
# Slice 16.2 will add polling controls (poll interval, lookback hours,
# project allowlist, fetch-comments toggle) — manifest stays unchanged.
