# Hyprland WebKit panel-freeze automatic cure — see
# docs/troubleshooting.md "Plugin/webview panel frozen on last frame
# after Hyprland workspace switch" for the full upstream-bug write-up.
#
# Drop this `[[triggers]]` block into your ~/.config/nestty/config.toml.
#
# What it does
# ------------
# Hyprland's WebKitGTK 6.0 ↔ wayland interaction leaves WebView
# panels stuck on their last frame after a workspace cycle (verified
# upstream — reproduces with the official MiniBrowser, zero nestty
# code involved). Empirical mitigation: a 1px window resize round-trip
# via `hyprctl dispatch resizeactive` re-enters WebKit's frame
# scheduler and unfreezes rendering.
#
# nestty Phase WR-1 publishes `window.restored` whenever the toplevel's
# `GDK_TOPLEVEL_STATE_SUSPENDED` bit clears (compositor told us we're
# visible/active again). nestty Phase WR-2 added `system.spawn` —
# trigger-only argv exec, intercepted at `LiveTriggerSink` and NOT
# registered in `ActionRegistry` so `nestctl call system.spawn` from
# any process holding NESTTY_SOCKET still gets `unknown_method`. Same
# trust posture as `[keybindings]` `spawn:`: the user-supplied
# `[[triggers]]` config is the trust boundary.
#
# Why a user-config trigger and not a hardcoded fix
# -------------------------------------------------
# - Compositor-agnostic: nestty doesn't ship Hyprland-specific code.
#   Other Wayland compositors don't toggle SUSPENDED on workspace
#   switch the same way, so this trigger is a no-op for them.
# - Reversible: when WebKit/Hyprland publishes a real fix, you delete
#   this snippet from your config — no nestty release needed.
#
# Why this specific snippet is safe to use `sh -c`
# ------------------------------------------------
# `system.spawn` doesn't auto-wrap argv in a shell — by default
# every `{event.*}` and `{context.*}` interpolation lands as a
# literal argv element where shell metacharacters can't be
# re-parsed. That default safety is what protects the bare-argv
# form. Choosing `["sh", "-c", "<string>"]` opts out: every
# interpolated value spliced into that string IS shell-evaluated.
#
# THIS snippet is safe only because it satisfies BOTH:
#   (a) every argv element is a LITERAL — no `{event.X}` and no
#       `{context.X}` substitutions inside the shell string; AND
#   (b) `window.restored` itself emits an empty `{}` payload, so
#       even an accidental `{event.X}` would resolve to a literal
#       token rather than attacker-controlled data.
#
# DO NOT cargo-cult this `sh -c` pattern to triggers that
# interpolate ANY field — event payload OR context fields. A
# trigger on `slack.mention` carrying a user-controlled `text`
# field, or one substituting `{context.active_cwd}` (a directory
# name an attacker can craft), would let a single message or a
# malicious dir name run arbitrary code. Use the bare argv form
# (`argv = ["program", "arg1", ...]`) for anything with
# interpolation.

[[triggers]]
name = "hyprland-webkit-cure"
action = "system.spawn"

[triggers.when]
event_kind = "window.restored"

[triggers.params]
# Empirically: `hyprctl --batch "<cmd1>; <cmd2>"` (single atomic
# Hyprland round-trip) does NOT cure the freeze on Hyprland 0.54.3 —
# the batched dispatches don't re-enter the per-frame scheduler.
# Two SEPARATE `hyprctl dispatch resizeactive` calls chained with
# `&&` DO cure. `&&` is a shell operator, so we wrap in `sh -c`.
#
# The argv-only no-shell rule on `system.spawn` is about preventing
# event-payload INTERPOLATION from injecting shell — `window.restored`
# emits an empty `{}` payload, so there's nothing to interpolate, so
# `sh -c` here adds zero injection surface. (A trigger that does
# interpolate event fields into shell strings IS unsafe; if you copy
# this pattern for a different event, audit the payload first.)
argv = [
    "sh",
    "-c",
    "hyprctl dispatch resizeactive 1 0 && hyprctl dispatch resizeactive -1 0",
]

# How to verify
# -------------
# 1. Install: `./scripts/install-dev.sh --restart` (or your usual
#    install path).
# 2. Open a plugin panel (e.g. `nestctl plugin open todo`).
# 3. Switch to another Hyprland workspace, then back to nestty's.
# 4. Without this trigger: panel is frozen on its last frame; click
#    inside it to revive.
# 5. With this trigger: panel repaints automatically. Stderr from
#    nestty shows `[nestty] window.restored: SUSPENDED bit cleared`
#    followed by `[nestty] trigger system.spawn pid=... argv=[...]`.
#
# If hyprctl isn't on PATH at nestty's launch env (e.g. nestty
# launched from a desktop entry that strips PATH), substitute the
# absolute path inside the same `sh -c` form (the `&&` chain is
# what cures — do NOT swap to `--batch`, see "Why this snippet"
# above):
#
#   argv = [
#       "sh", "-c",
#       "/usr/bin/hyprctl dispatch resizeactive 1 0 && /usr/bin/hyprctl dispatch resizeactive -1 0",
#   ]
