# Vision Flow 3 — the killer demo: clicking "start" on a Todo
# pops a turm tab with claude-code running inside a tmux session
# in a fresh git worktree, with a layered prompt pre-seeded into
# claude. Implemented as a chain of three triggers via Phase 14.1's
# auto-published `<action>.completed` events.
#
# Drop this whole file's `[[triggers]]` blocks into your
# ~/.config/turm/config.toml.
#
# Prereqs (already shipped):
# - Phase 15.1+: turm-plugin-todo registered. `todo.start` action
#   emits `todo.start_requested` with both `prompt` (raw per-Todo
#   frontmatter field, may be null) AND `assembled_prompt` (the
#   LAYERED string built at start time from `~/docs/claude/global.md`
#   + `~/docs/claude/workspaces/<ws>.md` + the Todo's `prompt`
#   (or title+body) + linked_kb markdown contents). Other fields:
#   id, workspace, title, body, status, priority, due, linked_jira,
#   linked_slack, linked_kb, tags. The trigger chain below feeds
#   `assembled_prompt` forward — that's the agent-facing string.
# - Phase 17.1: turm-plugin-git registered. `git.worktree_add`
#   creates the branch+dir; Phase 14.1 auto-emits
#   `git.worktree_add.completed {workspace, path, branch, base, prompt?}`.
#   `prompt` only appears when the upstream trigger forwards it via
#   the optional `prompt` passthrough param (used below).
# - Phase 18.1+18.2: claude.start spawns a turm tab with
#   cwd=workspace_path, runs `tmux new-session -A -s <name> claude`,
#   and (when `prompt` supplied) pastes the prompt into claude's
#   REPL once it becomes interactive — guarded by claude-specific
#   capture-pane markers AND `pane_current_command` so the prompt
#   never lands in a shell pane.
#
# Layered prompt management:
# - `~/docs/claude/global.md` — common preamble for every agent
#   session (coding rules, language conventions, etc.). The empty
#   stub is created by `scripts/install-plugins.sh` so vim picks it
#   up immediately.
# - `~/docs/claude/workspaces/<workspace>.md` — per-workspace
#   context. The Todo's `workspace` field selects which file gets
#   layered in.
# - Per-Todo: `prompt` frontmatter (when set) is the explicit
#   instruction; otherwise `title + body`.
# - `linked_kb` paths get their full markdown content fanned in
#   under `## Reference: <path>` headings.
# Edit any of these between Todo creation and `start` — the assembly
# is late-bound to start-time, so changes apply on the next click.
#
# Open limitations:
# - **Jira summary enrichment is NOT included** — needs Phase 16
#   (Jira plugin) + Phase 14.2 (async correlation) to join a fresh
#   `jira.get_ticket {key=linked_jira}` result back into the
#   prompt. Until then `linked_jira` shows up only as the raw key.
# - **Re-clicking Start on the same Todo IS supported.**
#   `git.worktree_add` is idempotent — it scans existing worktrees
#   for the target branch first and echoes the recorded path
#   without re-running `git worktree add`. The chain proceeds to
#   claude.start as usual; tmux re-attaches the existing session;
#   if a `prompt` is supplied it gets re-pasted (claude treats the
#   second paste as a new turn, useful when re-starting a Todo to
#   ask claude to redo something).
#
# What you get end-to-end today:
#   click Start in Todo panel
#     → turm-plugin-todo emits todo.start_requested with both raw
#       `prompt` and layered `assembled_prompt` fields
#     → trigger-1 or trigger-2 fires git.worktree_add (sanitize_jira
#       branch from linked_jira, or todo-<id>); the layered string
#       is forwarded via git.worktree_add's `prompt` passthrough so
#       trigger-3 can see it
#     → registry auto-emits git.worktree_add.completed (carries
#       `prompt` — the passthrough field, NOT to be confused with
#       todo.start_requested's `prompt`)
#     → trigger-3 fires claude.start with workspace_path + prompt
#     → new turm tab, fresh worktree, tmux session, claude REPL
#       opens with the layered prompt already pasted + submitted.
#
# Convention: the Todo plugin's `workspace` label and the git
# plugin's workspace `name` are assumed to coincide (e.g.
# todo.workspace = "turm" maps to a `[[workspace]] name = "turm"`
# entry in workspaces.toml). If you want them to differ, hardcode
# `workspace = "<git-name>"` instead of `{event.workspace}`.

# ---------------------------------------------------------------------
# Trigger 1 — Todo with linked_jira → branch from sanitized Jira key.
#   "PROJ-456"      → branch `proj-456`
#   "epic/PROJ-456" → branch `epic/proj-456` (slash hierarchy preserved)
# `prompt` carries the layered prompt forward so trigger 3 can seed
# claude with it (see git.worktree_add's `prompt` passthrough).
# ---------------------------------------------------------------------
[[triggers]]
name = "vision3-start-with-jira"
action = "git.worktree_add"
params = { workspace = "{event.workspace}", branch = "{event.linked_jira}", sanitize_jira = true, prompt = "{event.assembled_prompt}" }
condition = "event.linked_jira != null"

[triggers.when]
event_kind = "todo.start_requested"

# ---------------------------------------------------------------------
# Trigger 2 — Todo without linked_jira → branch `todo-<id>`.
#   T-20260427-0042 → branch `todo-T-20260427-0042`
# Lowercasing isn't necessary for generated todo ids (already in the
# allowed charset), so sanitize_jira is left at default false.
# ---------------------------------------------------------------------
[[triggers]]
name = "vision3-start-without-jira"
action = "git.worktree_add"
params = { workspace = "{event.workspace}", branch = "todo-{event.id}", prompt = "{event.assembled_prompt}" }
condition = "event.linked_jira == null"

[triggers.when]
event_kind = "todo.start_requested"

# ---------------------------------------------------------------------
# Trigger 3 — Once the worktree exists (newly created OR matched by
# git.worktree_add's idempotent-scan), drop a Claude session there
# with the layered prompt pre-seeded. session_name auto-derived from
# the worktree path's last 2 components, so re-clicking the same
# Todo re-attaches the existing tmux session and re-pastes the
# prompt as a fresh turn.
# ---------------------------------------------------------------------
[[triggers]]
name = "vision3-claude-after-worktree"
action = "claude.start"
# `event.prompt` here is the passthrough field that
# `git.worktree_add` echoed into its result (and thus the
# auto-published `.completed` event). Triggers 1+2 fed it from
# `todo.start_requested`'s `assembled_prompt` — the field rename
# happens at the worktree-add step, not here.
params = { workspace_path = "{event.path}", prompt = "{event.prompt}" }

[triggers.when]
event_kind = "git.worktree_add.completed"

# ---------------------------------------------------------------------
# Optional: log every worktree creation to a daily KB file so you
# have a trail of what you kicked off. Hooks the SAME
# `git.worktree_add.completed` event the chain uses, so it fires
# alongside (not after) trigger 3. Uncomment if you want it.
#
# Note: hooking on `claude.start.completed` would be more natural
# but doesn't work today — `claude.start` is a turm-internal
# socket action that lives in the legacy match arm of
# `socket::dispatch`, not the ActionRegistry, so Phase 14.1
# fan-out doesn't apply. Migrating claude.start into the registry
# would close that gap; tracked as a small follow-up.
